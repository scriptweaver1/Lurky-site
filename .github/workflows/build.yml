name: Build audios.json

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'build.py'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build audios.json
        env:
          REDDIT_CSV_URL: ${{ secrets.REDDIT_CSV_URL }}
          PATREON_CSV_URL: ${{ secrets.PATREON_CSV_URL }}
          SUBSTAR_CSV_URL: ${{ secrets.SUBSTAR_CSV_URL }}
        run: python build.py

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add audios.json
          if git diff --cached --quiet; then
            echo "No changes to audios.json"
          else
            git commit -m "Update audios.json [auto-build]"
            git push
          fi
